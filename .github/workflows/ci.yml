name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: pytest
        run: pytest -q
      - name: ruff
        run: ruff check .
      - name: mypy
        run: mypy app/
      - name: lint-imports
        run: lint-imports

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on tools/*.sh
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./tools

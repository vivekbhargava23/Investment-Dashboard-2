# update-context.yml
#
# Trigger: push to main
# Purpose: regenerate docs/CONTEXT.md after every merge so the chat surface
#          always has a current repo snapshot without manual paste.
#
# Bot-author guard (github.actor != 'github-actions[bot]'):
#   The post-merge-housekeeping workflow also commits to main with
#   github-actions[bot] as author. Without this guard, housekeeping's commit
#   would trigger another CONTEXT.md regeneration, which would commit again,
#   creating an infinite push loop. The guard breaks that cycle.

name: Update CONTEXT.md

on:
  push:
    branches:
      - main

jobs:
  update-context:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main (full history)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate CONTEXT.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tools/regen_context.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/CONTEXT.md
          if git diff --cached --quiet; then
            echo "docs/CONTEXT.md unchanged — nothing to commit."
          else
            git commit -m "chore: regenerate CONTEXT.md [skip ci]"
            git push origin main
            echo "Pushed updated CONTEXT.md."
          fi

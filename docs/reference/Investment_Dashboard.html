// ── Tab 1: Benchmark + Drawdown ───────────────────────────────────────────────
function BenchmarkDrawdownTab() {
  const [period, setPeriod] = useState("3M");

  // Generate portfolio + SPX benchmark history
  const genHistory = useCallback((p, isBenchmark=false) => {
    const points = {"1W":7,"1M":30,"3M":90,"6M":180,"1Y":365}[p]||90;
    const today = new Date("2026-05-02");
    const data = [];
    let val = 100; // normalised to 100
    const drift = isBenchmark ? 0.40 : 0.44; // benchmark slightly weaker
    for (let i = points; i >= 0; i--) {
      const d = new Date(today); d.setDate(d.getDate()-i);
      val *= (1+(Math.random()-drift)*0.013);
      data.push({ date: d.toISOString().slice(0,10), value: parseFloat(val.toFixed(2)) });
    }
    return data;
  }, []);

  const portData = useMemo(()=>genHistory(period,false),[period]);
  const spxData  = useMemo(()=>genHistory(period,true),[period]);

  // Drawdown calculation from peak
  const calcDrawdown = (data) => {
    let peak = -Infinity, maxDD = 0, currDD = 0;
    return data.map(d => {
      if (d.value > peak) peak = d.value;
      currDD = (d.value - peak) / peak * 100;
      if (currDD < maxDD) maxDD = currDD;
      return { ...d, dd: parseFloat(currDD.toFixed(2)) };
    });
  };
  const portDD = useMemo(()=>calcDrawdown(portData),[portData]);
  const maxDD  = Math.min(...portDD.map(d=>d.dd));
  const currDD = portDD[portDD.length-1]?.dd || 0;

  // Performance delta
  const portChg = ((portData[portData.length-1]?.value||100) - 100);
  const spxChg  = ((spxData[spxData.length-1]?.value||100) - 100);
  const alpha   = portChg - spxChg;

  // Volatility (std dev of daily returns)
  const calcVol = (data) => {
    const returns = data.slice(1).map((d,i) => (d.value - data[i].value)/data[i].value);
    const mean = returns.reduce((s,r)=>s+r,0)/returns.length;
    const variance = returns.reduce((s,r)=>s+(r-mean)**2,0)/returns.length;
    return Math.sqrt(variance * 252) * 100; // annualised
  };
  const portVol = useMemo(()=>calcVol(portData),[portData]);
  const spxVol  = useMemo(()=>calcVol(spxData),[spxData]);
  const sharpe  = portChg > 0 ? (portChg / portVol).toFixed(2) : "—";

  // Dual-line SVG chart
  function DualLineChart({ data1, data2, label1, label2, color1, color2, height=200, valueKey="value" }) {
    const all = [...data1.map(d=>d[valueKey]), ...data2.map(d=>d[valueKey])];
    const minV = Math.min(...all), maxV = Math.max(...all);
    const pad = { t:10, r:10, b:28, l:44 };
    const W = 880 - pad.l - pad.r, H = height - pad.t - pad.b;
    const x = i => (i/(data1.length-1))*W;
    const y = v => H - ((v-minV)/(maxV-minV||1))*H;
    const line = (data) => data.map((d,i)=>`${i===0?"M":"L"}${x(i).toFixed(1)},${y(d[valueKey]).toFixed(1)}`).join(" ");
    const xStep = Math.max(1,Math.floor(data1.length/5));
    const fmtDate = s => { const d=new Date(s); return `${d.getDate()} ${d.toLocaleString("en",{month:"short"})}`; };
    return (
      <svg viewBox={`0 0 880 ${height}`} style={{width:"100%",height}}>
        <defs>
          <linearGradient id="dg1" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color1} stopOpacity="0.15"/>
            <stop offset="100%" stopColor={color1} stopOpacity="0"/>
          </linearGradient>
        </defs>
        <g transform={`translate(${pad.l},${pad.t})`}>
          {[0,0.25,0.5,0.75,1].map((f,i) => {
            const v = minV + (maxV-minV)*f;
            const yp = y(v);
            return <line key={i} x1={0} y1={yp.toFixed(1)} x2={W} y2={yp.toFixed(1)} stroke="var(--border)" strokeWidth="1" strokeDasharray="3,3"/>;
          })}
          <path d={`${line(data1)} L${x(data1.length-1)},${H} L0,${H} Z`} fill="url(#dg1)"/>
          <path d={line(data1)} fill="none" stroke={color1} strokeWidth="2" strokeLinecap="round"/>
          <path d={line(data2)} fill="none" stroke={color2} strokeWidth="1.5" strokeLinecap="round" strokeDasharray="5,3"/>
          {[0,0.25,0.5,0.75,1].map((f,i) => {
            const v = minV + (maxV-minV)*f;
            return <text key={i} x={-6} y={(y(v)+4).toFixed(1)} textAnchor="end" fontSize="10" fill="var(--text3)" fontFamily="DM Mono,monospace">{v.toFixed(0)}</text>;
          })}
          {data1.filter((_,i)=>i%xStep===0||i===data1.length-1).map((d,_,arr)=>{
            const origIdx=data1.indexOf(d);
            return <text key={origIdx} x={x(origIdx).toFixed(1)} y={H+18} textAnchor="middle" fontSize="10" fill="var(--text3)" fontFamily="DM Mono,monospace">{fmtDate(d.date)}</text>;
          })}
          <text x={W-4} y={y(data1[data1.length-1][valueKey])-6} fontSize="10" fill={color1} fontFamily="DM Mono,monospace" textAnchor="end">{label1}</text>
          <text x={W-4} y={y(data2[data2.length-1][valueKey])+14} fontSize="10" fill={color2} fontFamily="DM Mono,monospace" textAnchor="end">{label2}</text>
        </g>
      </svg>
    );
  }

  return (
    <div>
      {/* Key metrics */}
      <div className="metric-row cols-4" style={{marginBottom:20}}>
        <div className="metric-card">
          <div className="metric-label">Alpha vs SPX</div>
          <div className={`metric-value sm metric-delta ${alpha>=0?"up":"down"}`}>{alpha>=0?"+":""}{alpha.toFixed(1)}%</div>
          <div className="metric-delta off" style={{marginTop:4}}>Portfolio {portChg>=0?"+":""}{portChg.toFixed(1)}% · SPX {spxChg>=0?"+":""}{spxChg.toFixed(1)}%</div>
        </div>
        <div className="metric-card">
          <div className="metric-label">Max Drawdown</div>
          <div className="metric-value sm" style={{color:"var(--red)"}}>{maxDD.toFixed(1)}%</div>
          <div className="metric-delta down" style={{marginTop:4}}>Current: {currDD.toFixed(1)}% from peak</div>
        </div>
        <div className="metric-card">
          <div className="metric-label">Annualised Volatility</div>
          <div className="metric-value sm">{portVol.toFixed(1)}%</div>
          <div className="metric-delta off" style={{marginTop:4}}>SPX: {spxVol.toFixed(1)}% · Rel: {(portVol/spxVol).toFixed(2)}x</div>
        </div>
        <div className="metric-card">
          <div className="metric-label">Sharpe Ratio ({period})</div>
          <div className={`metric-value sm ${parseFloat(sharpe)>1?"metric-delta up":parseFloat(sharpe)>0?"metric-delta amber":"metric-delta down"}`}>{sharpe}</div>
          <div className="metric-delta off" style={{marginTop:4}}>{parseFloat(sharpe)>1?"Good risk-adjusted return":parseFloat(sharpe)>0?"Acceptable":"Below risk-free rate"}</div>
        </div>
      </div>

      {/* Period selector */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div className="section-title">Portfolio vs S&P 500 (indexed to 100)</div>
        <div className="period-row" style={{marginBottom:0}}>
          {["1W","1M","3M","6M","1Y"].map(p=>(
            <button key={p} className={`period-btn${period===p?" active":""}`} onClick={()=>setPeriod(p)}>{p}</button>
          ))}
        </div>
      </div>

      {/* Dual chart */}
      <div className="chart-wrap" style={{marginBottom:16}}>
        <DualLineChart data1={portData} data2={spxData} label1="Portfolio" label2="SPX" color1="var(--green)" color2="var(--text3)" height={200}/>
        <div style={{display:"flex",gap:16,marginTop:8,fontSize:11}}>
          <span><span style={{display:"inline-block",width:16,height:2,background:"var(--green)",verticalAlign:"middle",marginRight:5,borderRadius:1}}></span>Portfolio</span>
          <span><span style={{display:"inline-block",width:16,height:2,background:"var(--text3)",verticalAlign:"middle",marginRight:5,borderRadius:1,opacity:0.6}}></span>S&P 500</span>
        </div>
      </div>

      {/* Drawdown chart */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div className="section-title">Drawdown from Peak (%)</div>
      </div>
      <div className="chart-wrap">
        {(() => {
          const data = portDD;
          const minV = Math.min(...data.map(d=>d.dd));
          const pad = {t:8,r:10,b:28,l:44};
          const W = 880-pad.l-pad.r, H = 120-pad.t-pad.b;
          const x = i => (i/(data.length-1))*W;
          const y = v => H - (v/minV)*H;
          const areaPath = data.map((d,i)=>`${i===0?"M":"L"}${x(i).toFixed(1)},${y(d.dd).toFixed(1)}`).join(" ") + ` L${x(data.length-1)},${H} L0,${H} Z`;
          const xStep = Math.max(1,Math.floor(data.length/5));
          const fmtDate = s => { const d=new Date(s); return `${d.getDate()} ${d.toLocaleString("en",{month:"short"})}`; };
          return (
            <svg viewBox={`0 0 880 120`} style={{width:"100%",height:120}}>
              <defs>
                <linearGradient id="ddGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="var(--red)" stopOpacity="0.4"/>
                  <stop offset="100%" stopColor="var(--red)" stopOpacity="0.05"/>
                </linearGradient>
              </defs>
              <g transform={`translate(${pad.l},${pad.t})`}>
                <line x1={0} y1={0} x2={W} y2={0} stroke="var(--border)" strokeWidth="1" strokeDasharray="3,3"/>
                <path d={areaPath} fill="url(#ddGrad)"/>
                <path d={data.map((d,i)=>`${i===0?"M":"L"}${x(i).toFixed(1)},${y(d.dd).toFixed(1)}`).join(" ")} fill="none" stroke="var(--red)" strokeWidth="1.5"/>
                {[-5,-10,-15,-20].filter(v=>v>=minV).map(v=>(
                  <g key={v}>
                    <line x1={0} y1={y(v).toFixed(1)} x2={W} y2={y(v).toFixed(1)} stroke="var(--border)" strokeWidth="1" strokeDasharray="2,4"/>
                    <text x={-6} y={(y(v)+4).toFixed(1)} textAnchor="end" fontSize="9" fill="var(--text3)" fontFamily="DM Mono,monospace">{v}%</text>
                  </g>
                ))}
                {data.filter((_,i)=>i%xStep===0||i===data.length-1).map((d,_,arr)=>{
                  const origIdx=data.indexOf(d);
                  return <text key={origIdx} x={x(origIdx).toFixed(1)} y={H+18} textAnchor="middle" fontSize="10" fill="var(--text3)" fontFamily="DM Mono,monospace">{fmtDate(d.date)}</text>;
                })}
              </g>
            </svg>
          );
        })()}
        <div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>Max drawdown this period: <span style={{color:"var(--red)",fontFamily:"DM Mono,monospace"}}>{maxDD.toFixed(1)}%</span> · Current: <span style={{color:"var(--amber)",fontFamily:"DM Mono,monospace"}}>{currDD.toFixed(1)}%</span></div>
      </div>
    </div>
  );
}

// ── Tab 2: Correlation Matrix ──────────────────────────────────────────────────
function CorrelationTab() {
  const { portfolio } = MOCK_DATA;
  const tickers = portfolio.positions.map(p=>p.ticker);

  // Generate mock correlation matrix (realistic for AI/semis heavy portfolio)
  const corrData = {
    "NVDA":   { "NVDA":1.00, "RHM.DE":0.18, "MU":0.72, "HY9H.F":0.68, "MRVL":0.75, "MTE.DE":0.12 },
    "RHM.DE": { "NVDA":0.18, "RHM.DE":1.00, "MU":0.14, "HY9H.F":0.11, "MRVL":0.16, "MTE.DE":0.38 },
    "MU":     { "NVDA":0.72, "RHM.DE":0.14, "MU":1.00, "HY9H.F":0.81, "MRVL":0.64, "MTE.DE":0.09 },
    "HY9H.F": { "NVDA":0.68, "RHM.DE":0.11, "MU":0.81, "HY9H.F":1.00, "MRVL":0.60, "MTE.DE":0.07 },
    "MRVL":   { "NVDA":0.75, "RHM.DE":0.16, "MU":0.64, "HY9H.F":0.60, "MRVL":1.00, "MTE.DE":0.14 },
    "MTE.DE": { "NVDA":0.12, "RHM.DE":0.38, "MU":0.09, "HY9H.F":0.07, "MRVL":0.14, "MTE.DE":1.00 },
  };

  const getColor = (v) => {
    if (v === 1) return "oklch(0.30 0.01 250)";
    if (v >= 0.7) return "oklch(0.22 0.12 25)";
    if (v >= 0.5) return "oklch(0.22 0.08 50)";
    if (v >= 0.3) return "oklch(0.22 0.04 80)";
    if (v >= 0.1) return "oklch(0.20 0.02 145)";
    return "oklch(0.22 0.06 145)";
  };
  const getTextColor = (v) => {
    if (v === 1) return "var(--text3)";
    if (v >= 0.7) return "var(--red)";
    if (v >= 0.5) return "var(--amber)";
    if (v >= 0.3) return "oklch(0.78 0.10 80)";
    return "var(--green)";
  };

  // Average correlation per ticker
  const avgCorr = tickers.map(t => {
    const others = tickers.filter(t2=>t2!==t);
    return { ticker:t, avg: others.reduce((s,t2)=>s+corrData[t][t2],0)/others.length };
  }).sort((a,b)=>b.avg-a.avg);

  return (
    <div>
      <div className="section-header" style={{marginTop:0}}>
        <div>
          <div className="section-title">Correlation Matrix</div>
          <div className="section-sub">30-day rolling pairwise correlation of daily returns · red = high correlation = less diversification</div>
        </div>
      </div>

      {/* Warning if high correlation */}
      <div className="flag-card high" style={{marginBottom:16}}>
        <div className="flag-title">⚠ High AI/Semiconductor Correlation</div>
        <div className="flag-desc">NVDA, MU, HY9H.F and MRVL show correlations of 0.60–0.81. These positions move together — your effective diversification is lower than 4 separate bets suggest.</div>
      </div>

      {/* Matrix */}
      <div className="table-wrap" style={{overflowX:"auto",marginBottom:20}}>
        <table style={{borderCollapse:"collapse",width:"100%",fontFamily:"DM Mono,monospace",fontSize:12}}>
          <thead>
            <tr>
              <th style={{padding:"8px 14px",textAlign:"left",fontSize:10,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",color:"var(--text3)",borderBottom:"1px solid var(--border)"}}></th>
              {tickers.map(t=>(
                <th key={t} style={{padding:"8px 10px",textAlign:"center",fontSize:11,fontWeight:600,color:"var(--text2)",borderBottom:"1px solid var(--border)",minWidth:72}}>{t}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {tickers.map(row=>(
              <tr key={row}>
                <td style={{padding:"8px 14px",fontWeight:600,color:"var(--text)",borderBottom:"1px solid var(--border)",whiteSpace:"nowrap"}}>{row}</td>
                {tickers.map(col=>{
                  const v = corrData[row][col];
                  return (
                    <td key={col} style={{
                      padding:"10px",textAlign:"center",
                      background: getColor(v),
                      color: getTextColor(v),
                      fontWeight: v >= 0.5 ? 600 : 400,
                      borderBottom:"1px solid var(--border)",
                      fontSize:12,
                    }}>
                      {v === 1 ? "—" : v.toFixed(2)}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Average correlation per position */}
      <div className="section-header">
        <div className="section-title">Average Correlation to Portfolio</div>
      </div>
      <div className="table-wrap">
        <table className="data-table">
          <thead>
            <tr>
              <th>Ticker</th>
              <th>Name</th>
              <th className="right">Avg Correlation</th>
              <th>Diversification Value</th>
              <th>Tags</th>
            </tr>
          </thead>
          <tbody>
            {avgCorr.map(({ticker,avg})=>{
              const pos = MOCK_DATA.portfolio.positions.find(p=>p.ticker===ticker);
              const divValue = avg < 0.2 ? "high" : avg < 0.4 ? "medium" : avg < 0.6 ? "low" : "very-low";
              const divLabel = {high:"High diversifier",medium:"Moderate",low:"Low — correlated",["very-low"]:"Very low — moves with portfolio"}[divValue];
              const divColor = {high:"green",medium:"amber",low:"amber",["very-low"]:"red"}[divValue];
              return (
                <tr key={ticker}>
                  <td className="mono" style={{fontWeight:600}}>{ticker}</td>
                  <td className="dim">{pos?.name}</td>
                  <td className="right">
                    <span style={{
                      fontFamily:"DM Mono,monospace",fontSize:13,fontWeight:600,
                      color: avg>=0.6?"var(--red)":avg>=0.4?"var(--amber)":"var(--green)"
                    }}>{avg.toFixed(2)}</span>
                  </td>
                  <td><Badge color={divColor}>{divLabel}</Badge></td>
                  <td><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{pos?.tags.map(t=><Badge key={t} color="dim">{t}</Badge>)}</div></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div className="caption" style={{marginTop:8}}>Lower avg correlation = more diversification benefit. RHM.DE and MTE.DE are your true diversifiers.</div>
    </div>
  );
}

// ── Tab 3: Technical Levels (Bloomberg-style) ─────────────────────────────────
function TechnicalsTab() {
  const { portfolio } = MOCK_DATA;
  const [selectedTicker, setSelectedTicker] = useState("NVDA");
  const selPos = portfolio.positions.find(p=>p.ticker===selectedTicker);

  // Generate price history with 200 points for MA calculation
  const priceData = useMemo(()=>{
    const today = new Date("2026-05-02");
    const data = [];
    let price = selPos.live_price * 0.55;
    let vol = 0;
    for (let i = 200; i >= 0; i--) {
      const d = new Date(today); d.setDate(d.getDate()-i);
      price *= (1+(Math.random()-0.46)*0.022);
      vol = Math.abs(price * (Math.random()*0.03+0.005) * selPos.total_shares * 1000);
      data.push({ date:d.toISOString().slice(0,10), price:parseFloat(price.toFixed(2)), vol:parseFloat(vol.toFixed(0)) });
    }
    data[data.length-1].price = selPos.live_price;
    return data;
  },[selectedTicker]);

  // Moving averages
  const ma = (data, period) => data.map((d,i)=>{
    if (i < period-1) return { ...d, ma: null };
    const avg = data.slice(i-period+1,i+1).reduce((s,x)=>s+x.price,0)/period;
    return { ...d, ma: parseFloat(avg.toFixed(2)) };
  });
  const ma50Data  = useMemo(()=>ma(priceData,50),[priceData]);
  const ma200Data = useMemo(()=>ma(priceData,200),[priceData]);

  const last50  = ma50Data[ma50Data.length-1]?.ma;
  const last200 = ma200Data[ma200Data.length-1]?.ma;
  const above50  = selPos.live_price > last50;
  const above200 = selPos.live_price > last200;
  const goldenCross = last50 > last200;

  // RSI
  const rsi = useMemo(()=>{
    const gains=[], losses=[], period=14;
    for (let i=1;i<priceData.length;i++){
      const diff=priceData[i].price-priceData[i-1].price;
      gains.push(Math.max(0,diff)); losses.push(Math.max(0,-diff));
    }
    let avgGain=gains.slice(0,period).reduce((s,v)=>s+v,0)/period;
    let avgLoss=losses.slice(0,period).reduce((s,v)=>s+v,0)/period;
    const rsiData=[...priceData.slice(0,period+1).map(d=>({...d,rsi:50}))];
    for (let i=period;i<gains.length;i++){
      avgGain=(avgGain*13+gains[i])/14;
      avgLoss=(avgLoss*13+losses[i])/14;
      const rs=avgLoss===0?100:avgGain/avgLoss;
      rsiData.push({...priceData[i+1],rsi:parseFloat((100-100/(1+rs)).toFixed(1))});
    }
    return rsiData;
  },[priceData]);
  const currentRSI = rsi[rsi.length-1]?.rsi || 50;

  // Bloomberg-style price+MA+volume+RSI chart
  const last90Price = priceData.slice(-90);
  const last90MA50  = ma50Data.slice(-90);
  const last90MA200 = ma200Data.slice(-90);
  const last90RSI   = rsi.slice(-90);

  const allPrices = last90Price.map(d=>d.price);
  const minP = Math.min(...allPrices)*0.995, maxP = Math.max(...allPrices)*1.005;
  const W = 860, pH = 200, vH = 50, rH = 60;
  const pad = {l:54,r:12,t:8,b:20};
  const cW = W - pad.l - pad.r;
  const xP = i => (i/(last90Price.length-1))*cW;
  const yP = v => pH - ((v-minP)/(maxP-minP))*pH;
  const yR = v => rH - ((v-0)/(100-0))*rH;
  const maxVol = Math.max(...last90Price.map(d=>d.vol));
  const linePath = (data, key) => data.filter(d=>d[key]!=null).map((d,i,arr)=>{
    const origI = last90Price.indexOf(last90Price.find(x=>x.date===d.date));
    return `${i===0?"M":"L"}${xP(origI).toFixed(1)},${yP(d[key]).toFixed(1)}`;
  }).join(" ");
  const xStep = Math.floor(last90Price.length/5);
  const fmtDate = s => { const d=new Date(s); return `${d.getDate()} ${d.toLocaleString("en",{month:"short"})}`; };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div className="section-title">Technical Levels — Bloomberg Style</div>
        <select className="select-field" value={selectedTicker} onChange={e=>setSelectedTicker(e.target.value)}>
          {portfolio.positions.map(p=><option key={p.ticker} value={p.ticker}>{p.ticker} — {p.name}</option>)}
        </select>
      </div>

      {/* Signal badges */}
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        <Badge color={above50?"green":"red"}>{above50?"▲ Above 50 DMA":"▼ Below 50 DMA"} ({last50?.toFixed(2)})</Badge>
        <Badge color={above200?"green":"red"}>{above200?"▲ Above 200 DMA":"▼ Below 200 DMA"} ({last200?.toFixed(2)})</Badge>
        <Badge color={goldenCross?"green":"red"}>{goldenCross?"✦ Golden Cross (50>200)":"✦ Death Cross (50<200)"}</Badge>
        <Badge color={currentRSI>70?"red":currentRSI<30?"green":"dim"}>RSI {currentRSI} {currentRSI>70?"— Overbought":currentRSI<30?"— Oversold":"— Neutral"}</Badge>
        <Badge color={selPos.unrealised_gain>=0?"green":"red"}>{selPos.currency} {selPos.live_price?.toFixed(2)} · {selPos.unrealised_gain>=0?"▲":"▼"} {(selPos.unrealised_gain_pct*100).toFixed(1)}%</Badge>
      </div>

      {/* Main Bloomberg chart */}
      <div className="chart-wrap" style={{padding:"16px 16px 8px"}}>
        <svg viewBox={`0 0 ${W} ${pH+vH+rH+pad.t+pad.b+24}`} style={{width:"100%",height:pH+vH+rH+pad.t+pad.b+24}}>
          <defs>
            <linearGradient id="blmGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="var(--green)" stopOpacity="0.1"/>
              <stop offset="100%" stopColor="var(--green)" stopOpacity="0"/>
            </linearGradient>
            <clipPath id="priceClip"><rect x="0" y="0" width={cW} height={pH}/></clipPath>
          </defs>

          {/* ── Price panel ── */}
          <g transform={`translate(${pad.l},${pad.t})`}>
            {/* Grid */}
            {[0,0.25,0.5,0.75,1].map((f,i)=>{
              const v = minP+(maxP-minP)*f;
              const yp = yP(v);
              return <g key={i}>
                <line x1={0} y1={yp.toFixed(1)} x2={cW} y2={yp.toFixed(1)} stroke="var(--border)" strokeWidth="1" strokeDasharray="3,3"/>
                <text x={-6} y={(yp+4).toFixed(1)} textAnchor="end" fontSize="10" fill="var(--text3)" fontFamily="DM Mono,monospace">{v.toFixed(0)}</text>
              </g>;
            })}
            {/* Area fill */}
            <path d={`${linePath(last90Price,"price")} L${xP(last90Price.length-1)},${pH} L0,${pH} Z`} fill="url(#blmGrad)" clipPath="url(#priceClip)"/>
            {/* Price line */}
            <path d={linePath(last90Price,"price")} fill="none" stroke={selPos.unrealised_gain>=0?"var(--green)":"var(--red)"} strokeWidth="2" clipPath="url(#priceClip)"/>
            {/* 50 DMA */}
            <path d={linePath(last90MA50,"ma")} fill="none" stroke="var(--amber)" strokeWidth="1.5" strokeDasharray="4,2" clipPath="url(#priceClip)"/>
            {/* 200 DMA */}
            <path d={linePath(last90MA200,"ma")} fill="none" stroke="var(--blue)" strokeWidth="1.5" strokeDasharray="6,3" clipPath="url(#priceClip)"/>
            {/* Current price line */}
            <line x1={0} y1={yP(selPos.live_price).toFixed(1)} x2={cW} y2={yP(selPos.live_price).toFixed(1)} stroke="var(--text3)" strokeWidth="0.5" strokeDasharray="2,4"/>
            {/* Labels */}
            <text x={cW+3} y={(yP(selPos.live_price)+4).toFixed(1)} fontSize="9" fill="var(--text2)" fontFamily="DM Mono,monospace">{selPos.live_price?.toFixed(0)}</text>
            {last50 && <text x={cW+3} y={(yP(last50)+4).toFixed(1)} fontSize="9" fill="var(--amber)" fontFamily="DM Mono,monospace">50d</text>}
            {last200 && <text x={cW+3} y={(yP(last200)+4).toFixed(1)} fontSize="9" fill="var(--blue)" fontFamily="DM Mono,monospace">200d</text>}
            {/* Panel label */}
            <text x={6} y={16} fontSize="10" fill="var(--text2)" fontFamily="DM Mono,monospace" fontWeight="600">{selectedTicker} · Price + MAs · 90d</text>
          </g>

          {/* ── Volume panel ── */}
          <g transform={`translate(${pad.l},${pad.t+pH+8})`}>
            <line x1={0} y1={0} x2={cW} y2={0} stroke="var(--border)" strokeWidth="1"/>
            <text x={6} y={12} fontSize="9" fill="var(--text3)" fontFamily="DM Mono,monospace">VOLUME</text>
            {last90Price.map((d,i)=>{
              const bH = Math.max(2,(d.vol/maxVol)*vH*0.85);
              const bW = Math.max(1,(cW/last90Price.length)*0.7);
              const bX = xP(i)-bW/2;
              const isUp = i===0||d.price>=last90Price[i-1].price;
              return <rect key={i} x={bX.toFixed(1)} y={(vH-bH).toFixed(1)} width={bW.toFixed(1)} height={bH.toFixed(1)} fill={isUp?"var(--green)":"var(--red)"} fillOpacity="0.6"/>;
            })}
          </g>

          {/* ── RSI panel ── */}
          <g transform={`translate(${pad.l},${pad.t+pH+vH+16})`}>
            <line x1={0} y1={0} x2={cW} y2={0} stroke="var(--border)" strokeWidth="1"/>
            <text x={6} y={12} fontSize="9" fill="var(--text3)" fontFamily="DM Mono,monospace">RSI(14)</text>
            {/* Overbought / oversold bands */}
            <rect x={0} y={yR(70).toFixed(1)} width={cW} height={(yR(30)-yR(70)).toFixed(1)} fill="var(--surface2)" opacity="0.5"/>
            <line x1={0} y1={yR(70).toFixed(1)} x2={cW} y2={yR(70).toFixed(1)} stroke="var(--red)" strokeWidth="0.5" strokeDasharray="3,3"/>
            <line x1={0} y1={yR(30).toFixed(1)} x2={cW} y2={yR(30).toFixed(1)} stroke="var(--green)" strokeWidth="0.5" strokeDasharray="3,3"/>
            <line x1={0} y1={yR(50).toFixed(1)} x2={cW} y2={yR(50).toFixed(1)} stroke="var(--border)" strokeWidth="0.5"/>
            <text x={-4} y={(yR(70)+4).toFixed(1)} textAnchor="end" fontSize="8" fill="var(--red)" fontFamily="DM Mono">70</text>
            <text x={-4} y={(yR(30)+4).toFixed(1)} textAnchor="end" fontSize="8" fill="var(--green)" fontFamily="DM Mono">30</text>
            <path
              d={last90RSI.filter(d=>d.rsi!=null).map((d,i,arr)=>{
                const origI=last90Price.findIndex(x=>x.date===d.date);
                if(origI<0)return null;
                return `${i===0?"M":"L"}${xP(origI).toFixed(1)},${yR(d.rsi).toFixed(1)}`;
              }).filter(Boolean).join(" ")}
              fill="none" stroke="var(--amber)" strokeWidth="1.5"/>
            {/* X axis labels — shared */}
            {last90Price.filter((_,i)=>i%xStep===0||i===last90Price.length-1).map((d,_,arr)=>{
              const origIdx=last90Price.indexOf(d);
              return <text key={origIdx} x={xP(origIdx).toFixed(1)} y={rH+16} textAnchor="middle" fontSize="10" fill="var(--text3)" fontFamily="DM Mono,monospace">{fmtDate(d.date)}</text>;
            })}
          </g>
        </svg>

        {/* Legend */}
        <div style={{display:"flex",gap:16,marginTop:4,fontSize:11,flexWrap:"wrap"}}>
          <span><span style={{display:"inline-block",width:16,height:2,background:selPos.unrealised_gain>=0?"var(--green)":"var(--red)",verticalAlign:"middle",marginRight:5,borderRadius:1}}></span>Price</span>
          <span><span style={{display:"inline-block",width:16,height:2,background:"var(--amber)",verticalAlign:"middle",marginRight:5,borderRadius:1}}></span>50 DMA</span>
          <span><span style={{display:"inline-block",width:16,height:2,background:"var(--blue)",verticalAlign:"middle",marginRight:5,borderRadius:1}}></span>200 DMA</span>
          <span><span style={{display:"inline-block",width:8,height:8,background:"var(--green)",verticalAlign:"middle",marginRight:5,borderRadius:1,opacity:0.6}}></span>Vol Up</span>
          <span><span style={{display:"inline-block",width:8,height:8,background:"var(--red)",verticalAlign:"middle",marginRight:5,borderRadius:1,opacity:0.6}}></span>Vol Down</span>
          <span style={{marginLeft:"auto",fontFamily:"DM Mono,monospace",color:"var(--amber)"}}>RSI: {currentRSI}</span>
        </div>
      </div>
    </div>
  );
}

// ── Tab 4: Position Sizer ─────────────────────────────────────────────────────
function PositionSizerTab() {
  const { portfolio, computeTotals } = MOCK_DATA;
  const { totalValue } = computeTotals();
  const [ticker, setTicker]         = useState("NVDA");
  const [riskPct, setRiskPct]       = useState(1.0);
  const [stopPct, setStopPct]       = useState(8.0);
  const [targetWeight, setTargetWeight] = useState(15.0);
  const [action, setAction]         = useState("BUY");

  const pos = portfolio.positions.find(p=>p.ticker===ticker);
  const price = pos?.live_price || 0;
  const riskAmount = totalValue * riskPct / 100;
  const sharesFromRisk = stopPct > 0 ? riskAmount / (price * stopPct/100) : 0;
  const costFromRisk = sharesFromRisk * price;
  const costEur = pos?.currency==="USD" ? costFromRisk/(pos?.fx_rate||1) : costFromRisk;

  const targetEur = totalValue * targetWeight / 100;
  const currentEur = pos?.currency==="USD" ? (pos?.current_value||0)/(pos?.fx_rate||1) : (pos?.current_value||0);
  const deltaEur = targetEur - currentEur;
  const sharesFromWeight = Math.abs(deltaEur) / (pos?.currency==="USD" ? price/(pos?.fx_rate||1) : price);

  const currentWeight = pos?.weight*100 || 0;

  const inputStyle = {
    background:"var(--surface2)",border:"1px solid var(--border2)",color:"var(--text)",
    borderRadius:6,padding:"8px 11px",fontFamily:"DM Mono,monospace",fontSize:13,
    outline:"none",width:"100%",
  };
  const labelStyle = {
    fontSize:11,fontWeight:600,letterSpacing:"0.04em",textTransform:"uppercase",
    color:"var(--text3)",marginBottom:4,display:"block",
  };

  return (
    <div>
      <div className="section-header" style={{marginTop:0}}>
        <div>
          <div className="section-title">Position Sizing Calculator</div>
          <div className="section-sub">Two methods: risk-based (% of portfolio to risk) and weight-based (target allocation %)</div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
        {/* Inputs */}
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div>
              <label style={labelStyle}>Position</label>
              <select style={inputStyle} value={ticker} onChange={e=>setTicker(e.target.value)}>
                {portfolio.positions.map(p=><option key={p.ticker} value={p.ticker}>{p.ticker}</option>)}
              </select>
            </div>
            <div>
              <label style={labelStyle}>Action</label>
              <div style={{display:"flex",gap:3,background:"var(--surface2)",borderRadius:7,padding:3}}>
                {["BUY","SELL"].map(a=>(
                  <button key={a} className={`period-btn${action===a?" active":""}`}
                    style={action===a?{background:"var(--surface)",color:a==="BUY"?"var(--green)":"var(--red)",fontWeight:600}:{}}
                    onClick={()=>setAction(a)}>{a}</button>
                ))}
              </div>
            </div>
          </div>

          <div className="metric-card">
            <div className="metric-label">Current Position</div>
            <div style={{display:"flex",gap:16,marginTop:6}}>
              <div><div style={{fontSize:10,color:"var(--text3)"}}>Weight</div><div style={{fontFamily:"DM Mono,monospace",fontWeight:600,color:currentWeight>35?"var(--red)":currentWeight>25?"var(--amber)":"var(--green)"}}>{currentWeight.toFixed(1)}%</div></div>
              <div><div style={{fontSize:10,color:"var(--text3)"}}>Value (€)</div><div style={{fontFamily:"DM Mono,monospace",fontWeight:600}}>{fmtEur(currentEur)}</div></div>
              <div><div style={{fontSize:10,color:"var(--text3)"}}>Price</div><div style={{fontFamily:"DM Mono,monospace",fontWeight:600}}>{pos?.currency} {price.toFixed(2)}</div></div>
              <div><div style={{fontSize:10,color:"var(--text3)"}}>Lots</div><div style={{fontFamily:"DM Mono,monospace",fontWeight:600}}>{pos?.lot_count}</div></div>
            </div>
          </div>

          <hr className="divider" style={{margin:"4px 0"}}/>

          <div>
            <div style={{fontSize:12,fontWeight:600,color:"var(--text2)",marginBottom:10}}>Method 1 — Risk-Based</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div>
                <label style={labelStyle}>Risk % of Portfolio</label>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <input style={{...inputStyle,width:80}} type="number" min={0.1} max={5} step={0.1} value={riskPct} onChange={e=>setRiskPct(parseFloat(e.target.value)||1)}/>
                  <span style={{fontSize:12,color:"var(--text3)"}}>= {fmtEur(totalValue*riskPct/100)}</span>
                </div>
              </div>
              <div>
                <label style={labelStyle}>Stop Loss %</label>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <input style={{...inputStyle,width:80}} type="number" min={1} max={30} step={0.5} value={stopPct} onChange={e=>setStopPct(parseFloat(e.target.value)||8)}/>
                  <span style={{fontSize:12,color:"var(--text3)"}}>below entry</span>
                </div>
              </div>
            </div>
          </div>

          <div>
            <div style={{fontSize:12,fontWeight:600,color:"var(--text2)",marginBottom:10}}>Method 2 — Weight-Based</div>
            <div>
              <label style={labelStyle}>Target Portfolio Weight %</label>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <input style={{...inputStyle,width:80}} type="number" min={1} max={40} step={0.5} value={targetWeight} onChange={e=>setTargetWeight(parseFloat(e.target.value)||15)}/>
                <span style={{fontSize:12,color:"var(--text3)"}}>of {fmtEur(totalValue)} portfolio</span>
              </div>
            </div>
          </div>
        </div>

        {/* Results */}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div className="metric-card" style={{border:"1px solid var(--green)",background:"oklch(0.17 0.04 145)"}}>
            <div className="metric-label" style={{color:"var(--green)"}}>Method 1 — Risk-Based Size</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:8}}>
              <div>
                <div style={{fontSize:10,color:"var(--text3)",marginBottom:2}}>Shares to trade</div>
                <div style={{fontFamily:"DM Mono,monospace",fontSize:18,fontWeight:700,color:"var(--green)"}}>{sharesFromRisk.toFixed(2)}</div>
              </div>
              <div>
                <div style={{fontSize:10,color:"var(--text3)",marginBottom:2}}>Trade amount (€)</div>
                <div style={{fontFamily:"DM Mono,monospace",fontSize:18,fontWeight:700,color:"var(--green)"}}>{fmtEur(costEur)}</div>
              </div>
              <div>
                <div style={{fontSize:10,color:"var(--text3)",marginBottom:2}}>Risk amount</div>
                <div style={{fontFamily:"DM Mono,monospace",fontSize:13,color:"var(--red)"}}>{fmtEur(riskAmount)} ({riskPct}%)</div>
              </div>
              <div>
                <div style={{fontSize:10,color:"var(--text3)",marginBottom:2}}>Stop price</div>
                <div style={{fontFamily:"DM Mono,monospace",fontSize:13,color:"var(--amber)"}}>{pos?.currency} {(price*(1-stopPct/100)).toFixed(2)}</div>
              </div>
            </div>
          </div>

          <div className="metric-card" style={{border:"1px solid var(--blue)",background:"var(--blue-bg)"}}>
            <div className="metric-label" style={{color:"var(--blue)"}}>Method 2 — Weight-Based Size</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:8}}>
              <div>
                <div style={{fontSize:10,color:"var(--text3)",marginBottom:2}}>Shares to {deltaEur>0?"buy":"sell"}</div>
                <div style={{fontFamily:"DM Mono,monospace",fontSize:18,fontWeight:700,color:deltaEur>0?"var(--green)":"var(--red)"}}>{sharesFromWeight.toFixed(2)}</div>
              </div>
              <div>
                <div style={{fontSize:10,color:"var(--text3)",marginBottom:2}}>Delta (€)</div>
                <div style={{fontFamily:"DM Mono,monospace",fontSize:18,fontWeight:700,color:deltaEur>0?"var(--green)":"var(--red)"}}>{fmtEur(deltaEur,true)}</div>
              </div>
              <div>
                <div style={{fontSize:10,color:"var(--text3)",marginBottom:2}}>Current weight</div>
                <div style={{fontFamily:"DM Mono,monospace",fontSize:13,color:"var(--text2)"}}>{currentWeight.toFixed(1)}%</div>
              </div>
              <div>
                <div style={{fontSize:10,color:"var(--text3)",marginBottom:2}}>Target weight</div>
                <div style={{fontFamily:"DM Mono,monospace",fontSize:13,color:"var(--blue)"}}>{targetWeight.toFixed(1)}%</div>
              </div>
            </div>
          </div>

          {/* New weight after trade */}
          <div className="metric-card">
            <div className="metric-label">New Weight After Method 1 Trade</div>
            {(() => {
              const newVal = currentEur + costEur;
              const newTotalVal = totalValue + costEur;
              const newWeight = newVal/newTotalVal*100;
              return (
                <>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
                    <span style={{fontFamily:"DM Mono,monospace",fontSize:16,fontWeight:600,color:newWeight>35?"var(--red)":newWeight>25?"var(--amber)":"var(--green)"}}>{newWeight.toFixed(1)}%</span>
                    <span style={{color:"var(--text3)",fontSize:12}}>of portfolio</span>
                    {newWeight>35&&<Badge color="red">Exceeds 35% limit</Badge>}
                    {newWeight>25&&newWeight<=35&&<Badge color="amber">Approaching limit</Badge>}
                  </div>
                  <div style={{marginTop:8,height:6,borderRadius:3,background:"var(--surface2)",overflow:"hidden",position:"relative"}}>
                    <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${currentWeight/40*100}%`,background:"var(--text3)",borderRadius:3,opacity:0.4}}></div>
                    <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${Math.min(100,newWeight/40*100)}%`,background:newWeight>35?"var(--red)":newWeight>25?"var(--amber)":"var(--green)",borderRadius:3}}></div>
                    <div style={{position:"absolute",left:`${35/40*100}%`,top:0,height:"100%",width:2,background:"var(--red)"}}></div>
                  </div>
                  <div style={{fontSize:10,color:"var(--text3)",marginTop:3}}>35% max limit marker shown</div>
                </>
              );
            })()}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Tab 5: Price Targets & Stop-Losses ────────────────────────────────────────
function PriceTargetsTab() {
  const { portfolio } = MOCK_DATA;

  // Default target data — editable inline
  const [targets, setTargets] = useState(portfolio.positions.map(pos => ({
    ticker: pos.ticker,
    name: pos.name,
    entry: (pos.total_cost_basis / pos.total_shares),
    current: pos.live_price,
    target: pos.live_price * (pos.thesis_status==="intact" ? 1.35 : pos.thesis_status==="watch" ? 1.12 : 0.95),
    stop: pos.live_price * (pos.thesis_status==="broken" ? 1.05 : 0.88),
    currency: pos.currency,
    fx_rate: pos.fx_rate,
    thesis_status: pos.thesis_status,
  })));

  const setField = (ticker, field, value) => {
    setTargets(prev => prev.map(t => t.ticker===ticker ? {...t, [field]:parseFloat(value)||0} : t));
  };

  const inputStyle = {
    background:"var(--surface2)",border:"1px solid var(--border2)",color:"var(--text)",
    borderRadius:5,padding:"4px 8px",fontFamily:"DM Mono,monospace",fontSize:12,
    outline:"none",width:90,textAlign:"right",
  };

  return (
    <div>
      <div className="section-header" style={{marginTop:0}}>
        <div>
          <div className="section-title">Price Targets & Stop-Losses</div>
          <div className="section-sub">Per-position targets, stops, and risk/reward ratios — edit inline</div>
        </div>
      </div>

      <div className="table-wrap">
        <table className="data-table">
          <thead>
            <tr>
              <th>Ticker</th>
              <th className="right">Entry</th>
              <th className="right">Current</th>
              <th className="right">Target</th>
              <th className="right">Stop Loss</th>
              <th className="right">Upside</th>
              <th className="right">Downside</th>
              <th className="right">R/R Ratio</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            {targets.map(t => {
              const upside   = (t.target - t.current) / t.current * 100;
              const downside = (t.current - t.stop) / t.current * 100;
              const rr       = downside > 0 ? (upside / downside) : 0;
              const atStop   = t.current <= t.stop * 1.02;
              const atTarget = t.current >= t.target * 0.98;
              return (
                <tr key={t.ticker} style={{background: atStop?"var(--red-bg)":atTarget?"var(--green-bg)":"transparent"}}>
                  <td className="mono" style={{fontWeight:700}}>{t.ticker}</td>
                  <td className="right">
                    <input style={inputStyle} type="number" step="0.01" value={t.entry.toFixed(2)}
                      onChange={e=>setField(t.ticker,"entry",e.target.value)}/>
                  </td>
                  <td className="right mono" style={{fontWeight:600,color:t.current>=t.entry?"var(--green)":"var(--red)"}}>{t.current?.toFixed(2)}</td>
                  <td className="right">
                    <input style={{...inputStyle,color:"var(--green)"}} type="number" step="0.01" value={t.target.toFixed(2)}
                      onChange={e=>setField(t.ticker,"target",e.target.value)}/>
                  </td>
                  <td className="right">
                    <input style={{...inputStyle,color:"var(--red)"}} type="number" step="0.01" value={t.stop.toFixed(2)}
                      onChange={e=>setField(t.ticker,"stop",e.target.value)}/>
                  </td>
                  <td className="right mono" style={{color:"var(--green)"}}>{upside>=0?"+":""}{upside.toFixed(1)}%</td>
                  <td className="right mono" style={{color:"var(--red)"}}>-{downside.toFixed(1)}%</td>
                  <td className="right">
                    <span style={{
                      fontFamily:"DM Mono,monospace",fontSize:13,fontWeight:700,
                      color: rr>=2?"var(--green)":rr>=1.5?"var(--amber)":"var(--red)"
                    }}>{rr.toFixed(1)}x</span>
                  </td>
                  <td>
                    {atStop   && <Badge color="red">⚠ Near Stop</Badge>}
                    {atTarget && <Badge color="green">✓ Near Target</Badge>}
                    {!atStop && !atTarget && <ThesisBadge status={t.thesis_status}/>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      <div className="info-box" style={{marginTop:12}}>
        <strong style={{color:"var(--text)"}}>R/R Ratio guide:</strong> ≥2x = good trade setup · ≥1.5x = acceptable · &lt;1x = avoid unless conviction is very high.
        Edit Target and Stop fields inline — changes update R/R in real time.
      </div>

      {/* Visual R/R bars */}
      <div className="section-header" style={{marginTop:24}}>
        <div className="section-title">Risk/Reward Visualisation</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {targets.map(t => {
          const upside   = Math.max(0,(t.target - t.current) / t.current * 100);
          const downside = Math.max(0,(t.current - t.stop) / t.current * 100);
          const rr       = downside > 0 ? upside/downside : 0;
          const maxBar   = 50; // max % for bar width scale
          return (
            <div key={t.ticker} className="metric-card" style={{padding:"12px 14px"}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontFamily:"DM Mono,monospace",fontWeight:700,fontSize:13,minWidth:72}}>{t.ticker}</span>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                    {/* Current price marker */}
                    <div style={{position:"relative",flex:1,height:18}}>
                      {/* Downside bar (red, left of center) */}
                      <div style={{position:"absolute",right:`${50}%`,top:5,height:8,width:`${Math.min(downside/maxBar*50,50)}%`,background:"var(--red)",borderRadius:"3px 0 0 3px",opacity:0.7}}></div>
                      {/* Upside bar (green, right of center) */}
                      <div style={{position:"absolute",left:`${50}%`,top:5,height:8,width:`${Math.min(upside/maxBar*50,50)}%`,background:"var(--green)",borderRadius:"0 3px 3px 0",opacity:0.7}}></div>
                      {/* Center marker */}
                      <div style={{position:"absolute",left:"50%",top:2,width:2,height:14,background:"var(--text)",borderRadius:1,transform:"translateX(-50%)"}}></div>
                    </div>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--text3)",fontFamily:"DM Mono,monospace"}}>
                    <span style={{color:"var(--red)"}}>Stop: {t.currency} {t.stop.toFixed(2)} (-{downside.toFixed(1)}%)</span>
                    <span style={{color:"var(--text2)"}}>Now: {t.current?.toFixed(2)}</span>
                    <span style={{color:"var(--green)"}}>Target: {t.currency} {t.target.toFixed(2)} (+{upside.toFixed(1)}%)</span>
                  </div>
                </div>
                <span style={{
                  fontFamily:"DM Mono,monospace",fontSize:14,fontWeight:700,minWidth:48,textAlign:"right",
                  color: rr>=2?"var(--green)":rr>=1.5?"var(--amber)":"var(--red)"
                }}>{rr.toFixed(1)}x</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// TWEAKS PANEL
// ─────────────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "green",
  "density": "comfortable",
  "showFxRates": true,
  "currencySymbol": "€",
  "overviewLayout": "chart-first",
  "chartHeight": 160,
  "showAllocation": true
}/*EDITMODE-END*/;

function TweaksContent({ tweaks, setTweak }) {
  return (
    <>
      <TweakSection title="Appearance">
        <TweakRadio
          label="Accent Color"
          value={tweaks.accentColor}
          options={[{value:"green",label:"Green"},{value:"blue",label:"Blue"},{value:"amber",label:"Amber"}]}
          onChange={v => {
            setTweak("accentColor", v);
            const map = { green:"oklch(0.72 0.18 145)", blue:"oklch(0.72 0.14 230)", amber:"oklch(0.78 0.16 80)" };
            document.documentElement.style.setProperty("--accent", map[v]);
            document.documentElement.style.setProperty("--green", map[v]);
          }}
        />
        <TweakRadio
          label="Table Density"
          value={tweaks.density}
          options={[{value:"compact",label:"Compact"},{value:"comfortable",label:"Comfy"}]}
          onChange={v => {
            setTweak("density", v);
            document.querySelectorAll(".data-table tbody td").forEach(el => {
              el.style.padding = v === "compact" ? "6px 10px" : "10px 12px";
            });
          }}
        />
      </TweakSection>
      <TweakSection title="Live Overview Layout">
        <TweakRadio
          label="Section Order"
          value={tweaks.overviewLayout}
          options={[
            {value:"chart-first", label:"Chart → Positions"},
            {value:"positions-first", label:"Positions → Chart"},
          ]}
          onChange={v => setTweak("overviewLayout", v)}
        />
        <TweakSlider
          label="Chart Height"
          value={tweaks.chartHeight}
          min={80} max={280} step={20}
          onChange={v => setTweak("chartHeight", v)}
        />
        <TweakToggle
          label="Show Allocation Charts"
          value={tweaks.showAllocation}
          onChange={v => setTweak("showAllocation", v)}
        />
      </TweakSection>
      <TweakSection title="Data">
        <TweakToggle
          label="Show FX Rates"
          value={tweaks.showFxRates}
          onChange={v => setTweak("showFxRates", v)}
        />
      </TweakSection>
    </>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// APP SHELL
// ─────────────────────────────────────────────────────────────────────────
const NAV_ITEMS = [
  { id:"overview",    label:"Live Overview",       icon:"◉", badge: null },
  { id:"analytics",   label:"Analytics & Risk",    icon:"⬡", badge: { text:"new", color:"amber" } },
  { id:"performance", label:"Performance",         icon:"↗", badge: null },
  { id:"tax",         label:"Tax Dashboard",       icon:"§", badge: null },
  { id:"decision",    label:"Decision Gates",      icon:"▲", badge: { text:"3 flags", color:"" } },
  { id:"behaviour",   label:"Behavioural Ledger",  icon:"◎", badge: null },
  { id:"lots",        label:"Lot Ledger",          icon:"≡", badge: null },
  { id:"manage",      label:"Manage Portfolio",    icon:"⚙", badge: null },
];

const PAGE_TITLES = {
  overview:    "Live Overview",
  analytics:   "Analytics & Risk",
  performance: "Performance",
  tax:         "Tax Dashboard",
  decision:    "Decision Gates & Risk Flags",
  behaviour:   "Behavioural Ledger",
  lots:        "Lot Ledger",
  manage:      "Manage Portfolio",
};

function App() {
  const [page, setPage] = useState("overview");
  const { tweaks, setTweak, TweaksPanel: TP } = useTweaks(TWEAK_DEFAULTS);

  // Keep global ref in sync so OverviewPage can read without prop-drilling
  Object.assign(_activeTweaks, tweaks);

  const renderPage = () => {
    switch(page) {
      case "overview":    return <OverviewPage />;
      case "analytics":   return <AnalyticsPage />;
      case "performance": return <PerformancePage />;
      case "tax":         return <TaxPage />;
      case "decision":    return <DecisionGatesPage />;
      case "behaviour":   return <BehaviouralPage />;
      case "lots":        return <LotLedgerPage />;
      case "manage":      return <ManagePortfolioPage />;
      default:            return <OverviewPage />;
    }
  };

  return (
    <>
      <div id="root" style={{display:"flex",height:"100vh",overflow:"hidden"}}>
        {/* Sidebar */}
        <div className="sidebar">
          <div className="sidebar-logo">
            <div className="mark">
              <div className="icon">📈</div>
              <div>
                <div className="name">Investment Panel</div>
                <div className="sub">Scalable Capital · DE</div>
              </div>
            </div>
          </div>
          <nav className="sidebar-nav">
            <div className="nav-section-label">Portfolio</div>
            {NAV_ITEMS.filter(i => i.id !== "manage").map(item => (
              <button
                key={item.id}
                className={`nav-item${page===item.id?" active":""}`}
                onClick={()=>setPage(item.id)}
              >
                <span className="nav-icon">{item.icon}</span>
                {item.label}
                {item.badge && (
                  <span className={`nav-badge${item.badge.color?" "+item.badge.color:""}`}>{item.badge.text}</span>
                )}
              </button>
            ))}
            <div className="nav-section-label" style={{marginTop:8}}>Settings</div>
            <button
              className={`nav-item${page==="manage"?" active":""}`}
              onClick={()=>setPage("manage")}
            >
              <span className="nav-icon">⚙</span>
              Manage Portfolio
            </button>
          </nav>
          <div className="sidebar-footer">
            <span><span className="live-dot"></span>Live prices</span>
            <span>2026-05-02</span>
          </div>
        </div>

        {/* Main */}
        <div className="main">
          <div className="topbar">
            <h1>{PAGE_TITLES[page]}</h1>
            <div className="topbar-meta">USD/EUR 1.0786 · {new Date().toLocaleTimeString("en-DE",{hour:"2-digit",minute:"2-digit"})}</div>
            <button className="refresh-btn">↺ Refresh</button>
          </div>
          <div className="page-content">
            {renderPage()}
          </div>
        </div>
      </div>

      {TP && (
        <TP>
          <TweaksContent tweaks={tweaks} setTweak={setTweak} />
        </TP>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

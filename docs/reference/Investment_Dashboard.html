<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Investment Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<!-- Recharts loaded dynamically below -->

<script src="components/data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        oklch(0.13 0.012 250);
    --surface:   oklch(0.17 0.010 250);
    --surface2:  oklch(0.20 0.010 250);
    --border:    oklch(0.26 0.010 250);
    --border2:   oklch(0.30 0.010 250);
    --text:      oklch(0.93 0.008 250);
    --text2:     oklch(0.62 0.010 250);
    --text3:     oklch(0.42 0.010 250);
    --green:     oklch(0.72 0.18 145);
    --green-bg:  oklch(0.20 0.05 145);
    --red:       oklch(0.62 0.20 25);
    --red-bg:    oklch(0.20 0.06 25);
    --amber:     oklch(0.78 0.16 80);
    --amber-bg:  oklch(0.20 0.05 80);
    --blue:      oklch(0.72 0.14 230);
    --blue-bg:   oklch(0.19 0.05 230);
    --accent:    oklch(0.72 0.18 145);
    --nav-w:     220px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5; }

  #root { display: flex; height: 100vh; overflow: hidden; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--nav-w);
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-logo {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo .mark {
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .sidebar-logo .icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 7px;
    display: grid; place-items: center;
    font-size: 14px;
  }
  .sidebar-logo .name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.01em;
  }
  .sidebar-logo .sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 1px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.03em;
  }

  .sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 10px 8px;
  }

  .nav-section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 10px 10px 4px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    border-radius: 7px;
    cursor: pointer;
    color: var(--text2);
    font-size: 13px;
    font-weight: 450;
    transition: background 0.12s, color 0.12s;
    user-select: none;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--green-bg); color: var(--green); font-weight: 550; }
  .nav-item .nav-icon { font-size: 15px; flex-shrink: 0; width: 18px; text-align: center; }
  .nav-badge {
    margin-left: auto;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    background: var(--red-bg);
    color: var(--red);
    padding: 1px 6px;
    border-radius: 10px;
    font-weight: 500;
  }
  .nav-badge.amber { background: var(--amber-bg); color: var(--amber); }

  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-footer .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    margin-right: 5px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Main content ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    height: 52px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    flex-shrink: 0;
    background: var(--surface);
  }
  .topbar h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }
  .topbar-meta {
    font-size: 12px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }
  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text2);
    border-radius: 6px;
    padding: 5px 11px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.12s, color 0.12s;
  }
  .refresh-btn:hover { background: var(--border); color: var(--text); }

  .page-content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  /* ── Cards & metrics ── */
  .metric-row {
    display: grid;
    gap: 12px;
    margin-bottom: 20px;
  }
  .metric-row.cols-2 { grid-template-columns: repeat(2, 1fr); }
  .metric-row.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .metric-row.cols-3 { grid-template-columns: repeat(3, 1fr); }

  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .metric-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .metric-value {
    font-size: 24px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .metric-value.sm { font-size: 18px; }
  .metric-delta {
    font-size: 12px;
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }
  .metric-delta.up   { color: var(--green); }
  .metric-delta.down { color: var(--red); }
  .metric-delta.off  { color: var(--text3); }
  .metric-delta.amber { color: var(--amber); }

  /* ── Section headers ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    margin-top: 24px;
  }
  .section-header:first-child { margin-top: 0; }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.01em;
  }
  .section-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }

  /* ── Tables ── */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .data-table thead th {
    text-align: left;
    padding: 8px 12px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .data-table thead th.right { text-align: right; }
  .data-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .data-table tbody tr:last-child { border-bottom: none; }
  .data-table tbody tr:hover { background: var(--surface2); }
  .data-table tbody td {
    padding: 10px 12px;
    color: var(--text);
    white-space: nowrap;
  }
  .data-table tbody td.right { text-align: right; }
  .data-table tbody td.mono { font-family: 'DM Mono', monospace; font-size: 12px; }
  .data-table tbody td.dim { color: var(--text2); }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  /* ── Badges ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    line-height: 1.6;
  }
  .badge.green  { background: var(--green-bg);  color: var(--green); }
  .badge.red    { background: var(--red-bg);    color: var(--red); }
  .badge.amber  { background: var(--amber-bg);  color: var(--amber); }
  .badge.blue   { background: var(--blue-bg);   color: var(--blue); }
  .badge.dim    { background: var(--surface2);  color: var(--text2); }
  .badge .dot   { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  /* ── Progress bar ── */
  .progress-wrap {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

  /* ── Flag cards ── */
  .flag-card {
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
    border-left: 3px solid;
  }
  .flag-card.critical { background: var(--red-bg);   border-color: var(--red);   }
  .flag-card.high     { background: oklch(0.20 0.04 50); border-color: var(--amber); }
  .flag-card.medium   { background: var(--amber-bg); border-color: var(--amber); }
  .flag-card.low      { background: var(--green-bg); border-color: var(--green); }
  .flag-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .flag-desc  { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .flag-meta  { font-size: 11px; color: var(--text3); margin-top: 4px; font-family: 'DM Mono', monospace; }

  /* ── Checklist ── */
  .checklist-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }
  .checklist-item:hover { background: var(--surface2); }
  .checklist-item.checked { opacity: 0.6; }
  .check-box {
    width: 16px; height: 16px;
    border-radius: 4px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    margin-top: 1px;
    display: grid; place-items: center;
    transition: background 0.12s, border-color 0.12s;
  }
  .check-box.checked { background: var(--green); border-color: var(--green); }
  .check-text { font-size: 13px; color: var(--text2); line-height: 1.45; }
  .check-text.checked { text-decoration: line-through; color: var(--text3); }
  .check-category {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text3);
    margin-top: 12px;
    margin-bottom: 4px;
    padding: 0 12px;
  }

  /* ── Charts ── */
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 18px 10px;
  }

  /* ── Tabs (within page) ── */
  .tab-row {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
  }
  .tab-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }
  .tab-btn:hover { background: var(--surface2); color: var(--text); }
  .tab-btn.active { background: var(--surface2); color: var(--text); font-weight: 550; }

  /* ── Period selector ── */
  .period-row {
    display: flex;
    gap: 3px;
    background: var(--surface2);
    border-radius: 7px;
    padding: 3px;
    width: fit-content;
    margin-bottom: 16px;
  }
  .period-btn {
    padding: 4px 10px;
    border-radius: 5px;
    border: none;
    background: none;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }
  .period-btn.active { background: var(--surface); color: var(--text); }

  /* ── Misc ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .caption { font-size: 11px; color: var(--text3); margin-top: 8px; }
  .info-box {
    background: var(--blue-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text2);
  }
  .select-field {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }
  .select-field:focus { border-color: var(--accent); }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  /* ── Lot row expand ── */
  .lot-row { background: var(--bg); }
  .lot-row td { padding: 6px 12px 6px 36px; font-size: 12px; color: var(--text3); }

  /* ── Weight bar inline ── */
  .weight-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .weight-bar { height: 4px; border-radius: 2px; background: var(--green); flex-shrink: 0; }

  /* ── Session expander ── */
  .expander {
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .expander-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 14px;
    cursor: pointer;
    background: var(--surface);
    transition: background 0.1s;
    user-select: none;
  }
  .expander-header:hover { background: var(--surface2); }
  .expander-body {
    padding: 12px 14px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--text2);
  }

  /* ── Tweaks button ── */
  .top-badge-row { display: flex; align-items: center; gap: 8px; }

</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;
// ─────────────────────────────────────────────────────────────────────────
// Pure-SVG chart primitives (no external deps)
// ─────────────────────────────────────────────────────────────────────────
function MiniAreaChart({ data, color, valueKey, width=500, height=200 }) {
  const [tooltip, setTooltip] = useState(null);
  if (!data || data.length < 2) return null;
  const vals = data.map(d => d[valueKey]);
  const minV = Math.min(...vals), maxV = Math.max(...vals);
  const pad = { t:10, r:10, b:28, l:56 };
  const W = width - pad.l - pad.r, H = height - pad.t - pad.b;
  const x = i => (i / (data.length - 1)) * W;
  const y = v => H - ((v - minV) / (maxV - minV || 1)) * H;
  const pts = data.map((d,i) => [x(i), y(d[valueKey])]);
  const linePath = pts.map((p,i) => `${i===0?"M":"L"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
  const areaPath = linePath + ` L${pts[pts.length-1][0].toFixed(1)},${H} L0,${H} Z`;
  // Y axis ticks
  const yTicks = 4;
  const tickStep = (maxV - minV) / yTicks;
  // X ticks — show ~5 labels
  const xStep = Math.max(1, Math.floor(data.length / 5));
  const fmtDate = s => { const d = new Date(s); return `${d.getDate()} ${d.toLocaleString("en",{month:"short"})}`; };

  return (
    <div style={{position:"relative",width:"100%",height}}>
      <svg viewBox={`0 0 ${width} ${height}`} style={{width:"100%",height:"100%"}}
        onMouseLeave={() => setTooltip(null)}>
        <defs>
          <linearGradient id={`ag-${color.replace(/[^a-z]/gi,"")}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.22"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient>
        </defs>
        <g transform={`translate(${pad.l},${pad.t})`}>
          {/* Grid lines */}
          {Array.from({length:yTicks+1},(_,i)=>{
            const v = minV + tickStep * i;
            const yp = y(v);
            return <line key={i} x1={0} y1={yp.toFixed(1)} x2={W} y2={yp.toFixed(1)}
              stroke="var(--border)" strokeWidth="1" strokeDasharray="3,3"/>;
          })}
          {/* Area fill */}
          <path d={areaPath} fill={`url(#ag-${color.replace(/[^a-z]/gi,"")})`}/>
          {/* Line */}
          <path d={linePath} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          {/* Tooltip dot */}
          {tooltip != null && (
            <circle cx={pts[tooltip][0]} cy={pts[tooltip][1]} r={4} fill={color} stroke="var(--surface)" strokeWidth={2}/>
          )}
          {/* Invisible hover targets */}
          {data.map((_,i) => (
            <rect key={i} x={i===0?0:x(i-1)+W/(data.length-1)/2} y={0}
              width={W/(data.length-1)} height={H} fill="transparent"
              onMouseEnter={() => setTooltip(i)}/>
          ))}
          {/* Y axis labels */}
          {Array.from({length:yTicks+1},(_,i)=>{
            const v = minV + tickStep * i;
            const yp = y(v);
            const label = v >= 10000 ? `€${(v/1000).toFixed(0)}k` : v >= 100 ? `${v.toFixed(0)}` : v.toFixed(1);
            return <text key={i} x={-6} y={yp+4} textAnchor="end"
              fontSize="10" fill="var(--text3)" fontFamily="DM Mono,monospace">{label}</text>;
          })}
          {/* X axis labels */}
          {data.filter((_,i) => i % xStep === 0 || i === data.length-1).map((d,_,arr) => {
            const origIdx = data.indexOf(d);
            return <text key={origIdx} x={x(origIdx)} y={H+18} textAnchor="middle"
              fontSize="10" fill="var(--text3)" fontFamily="DM Mono,monospace">
              {fmtDate(d.date)}
            </text>;
          })}
        </g>
      </svg>
      {/* Tooltip box */}
      {tooltip != null && (() => {
        const d = data[tooltip];
        const xPct = (tooltip / (data.length-1)) * 100;
        const v = d[valueKey];
        const label = v >= 1000 ? `€${v.toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2})}` : v.toFixed(2);
        return (
          <div style={{position:"absolute",top:8,left:xPct > 60 ? "auto":"auto",
            background:"var(--surface2)",border:"1px solid var(--border)",
            borderRadius:6,padding:"5px 10px",fontSize:12,pointerEvents:"none",
            transform:`translateX(calc(${xPct}% - 50%))`,left:`calc(${pad.l}px + ${xPct}% * (${(width-pad.l-pad.r)}/100) / ${width} * 100%)`,
            whiteSpace:"nowrap",zIndex:10}}>
            <span style={{color:"var(--text3)",marginRight:6}}>{d.date}</span>
            <span style={{color,fontFamily:"DM Mono,monospace",fontWeight:600}}>{label}</span>
          </div>
        );
      })()}
    </div>
  );
}

function MiniBarChart({ data, nameKey, valueKey, width=500, height=200 }) {
  const [hovered, setHovered] = useState(null);
  if (!data || data.length === 0) return null;
  const vals = data.map(d => d[valueKey]);
  const minV = Math.min(0, ...vals), maxV = Math.max(0, ...vals);
  const pad = { t:10, r:10, b:28, l:64 };
  const W = width - pad.l - pad.r, H = height - pad.t - pad.b;
  const barW = (W / data.length) * 0.6;
  const barGap = W / data.length;
  const yZero = H * maxV / (maxV - minV || 1);
  const yScale = v => H * (maxV - v) / (maxV - minV || 1);
  const barH = v => Math.abs(v) / (maxV - minV || 1) * H;

  return (
    <div style={{position:"relative",width:"100%",height}}>
      <svg viewBox={`0 0 ${width} ${height}`} style={{width:"100%",height:"100%"}}>
        <g transform={`translate(${pad.l},${pad.t})`}>
          {/* Zero line */}
          <line x1={0} y1={yZero.toFixed(1)} x2={W} y2={yZero.toFixed(1)}
            stroke="var(--border2)" strokeWidth="1"/>
          {/* Grid */}
          {[-1,0,1].map(i => {
            const v = i * maxV * 0.6;
            const yp = yScale(v);
            if (yp < 0 || yp > H) return null;
            const label = Math.abs(v) >= 1000 ? `€${(v/1000).toFixed(0)}k` : `€${v.toFixed(0)}`;
            return <g key={i}>
              <line x1={0} y1={yp.toFixed(1)} x2={W} y2={yp.toFixed(1)}
                stroke="var(--border)" strokeWidth="1" strokeDasharray="3,3"/>
              <text x={-6} y={yp+4} textAnchor="end" fontSize="10" fill="var(--text3)" fontFamily="DM Mono,monospace">{label}</text>
            </g>;
          })}
          {/* Bars */}
          {data.map((d,i) => {
            const v = d[valueKey];
            const bx = i * barGap + (barGap - barW) / 2;
            const by = v >= 0 ? yScale(v) : yZero;
            const bh = barH(v);
            const col = v >= 0 ? "var(--green)" : "var(--red)";
            const isHov = hovered === i;
            return (
              <g key={i}>
                <rect x={bx.toFixed(1)} y={by.toFixed(1)} width={barW.toFixed(1)} height={Math.max(2,bh).toFixed(1)}
                  rx="3" fill={col} fillOpacity={isHov ? 1 : 0.8}
                  onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)}
                  style={{cursor:"default"}}/>
                <text x={(bx + barW/2).toFixed(1)} y={H+18} textAnchor="middle"
                  fontSize="10" fill={isHov?"var(--text)":"var(--text3)"} fontFamily="DM Mono,monospace">
                  {d[nameKey]}
                </text>
                {isHov && (
                  <text x={(bx + barW/2).toFixed(1)} y={(v>=0?by-4:by+bh+12).toFixed(1)}
                    textAnchor="middle" fontSize="10" fill={col} fontFamily="DM Mono,monospace" fontWeight="600">
                    {v>=0?"+":""}€{Math.abs(v).toFixed(0)}
                  </text>
                )}
              </g>
            );
          })}
        </g>
      </svg>
    </div>
  );
}

function MiniPieChart({ data, width=260, height=200 }) {
  const [hovered, setHovered] = useState(null);
  const total = data.reduce((s,d)=>s+d.value,0);
  const cx = width/2, cy = height*0.52, r=Math.min(cx,cy)*0.72, ri=r*0.55;
  let angle = -Math.PI/2;
  const slices = data.map((d,i) => {
    const sweep = (d.value/total) * Math.PI * 2;
    const a1 = angle, a2 = angle + sweep;
    angle = a2;
    const x1=cx+Math.cos(a1)*r, y1=cy+Math.sin(a1)*r;
    const x2=cx+Math.cos(a2)*r, y2=cy+Math.sin(a2)*r;
    const xi1=cx+Math.cos(a1)*ri, yi1=cy+Math.sin(a1)*ri;
    const xi2=cx+Math.cos(a2)*ri, yi2=cy+Math.sin(a2)*ri;
    const large = sweep > Math.PI ? 1 : 0;
    const path = `M${xi1.toFixed(2)},${yi1.toFixed(2)} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${large},1 ${x2.toFixed(2)},${y2.toFixed(2)} L${xi2.toFixed(2)},${yi2.toFixed(2)} A${ri},${ri} 0 ${large},0 ${xi1.toFixed(2)},${yi1.toFixed(2)} Z`;
    const midA = a1 + sweep/2;
    return { ...d, path, midA, i };
  });

  const hov = hovered !== null ? slices[hovered] : null;

  return (
    <svg viewBox={`0 0 ${width} ${height}`} style={{width:"100%",height}}>
      {slices.map((s,i) => {
        const isHov = hovered===i;
        const scale = isHov ? 1.04 : 1;
        const tx = isHov ? (cx + Math.cos(s.midA)*r*0.04) : 0;
        const ty = isHov ? (cy + Math.sin(s.midA)*r*0.04) : 0;
        return (
          <path key={i} d={s.path} fill={s.color} fillOpacity={isHov?1:0.85}
            stroke="var(--surface)" strokeWidth={1.5}
            transform={isHov ? `translate(${(tx-cx*(scale-1)).toFixed(2)},${(ty-cy*(scale-1)).toFixed(2)}) scale(${scale})` : ""}
            style={{transformOrigin:`${cx}px ${cy}px`,cursor:"pointer"}}
            onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)}/>
        );
      })}
      {hov ? (
        <>
          <text x={cx} y={cy-8} textAnchor="middle" fontSize="13" fill="var(--text)" fontFamily="DM Mono,monospace" fontWeight="600">{hov.name}</text>
          <text x={cx} y={cy+10} textAnchor="middle" fontSize="12" fill={hov.color} fontFamily="DM Mono,monospace">{hov.value}%</text>
        </>
      ) : (
        <>
          <text x={cx} y={cy-4} textAnchor="middle" fontSize="11" fill="var(--text3)" fontFamily="DM Sans,sans-serif">Portfolio</text>
          <text x={cx} y={cy+12} textAnchor="middle" fontSize="11" fill="var(--text3)" fontFamily="DM Sans,sans-serif">Allocation</text>
        </>
      )}
    </svg>
  );
}

// ─────────────────────────────────────────────────────────────────────────

const fmtEur  = (v, sign=false) => v == null ? "—" : `${sign && v>0?"+":""}€${Math.abs(v).toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const fmtPct  = (v, sign=false) => v == null ? "—" : `${sign && v>0?"+":""}${(v*100).toFixed(1)}%`;
const fmtNum  = (v, dp=2) => v == null ? "—" : v.toLocaleString("de-DE",{minimumFractionDigits:dp,maximumFractionDigits:dp});
const gainClass = v => v >= 0 ? "up" : "down";
const severityLabel = s => ({ critical:"Critical", high:"High", medium:"Medium", low:"Low" }[s] || s);
const severityBadge = s => ({ critical:"red", high:"amber", medium:"amber", low:"green" }[s] || "dim");

// ─────────────────────────────────────────────────────────────────────────
// Mini components
// ─────────────────────────────────────────────────────────────────────────
function MetricCard({ label, value, delta, deltaClass, small }) {
  return (
    <div className="metric-card">
      <div className="metric-label">{label}</div>
      <div className={`metric-value${small?" sm":""}`}>{value}</div>
      {delta && <div className={`metric-delta ${deltaClass||"off"}`}>{delta}</div>}
    </div>
  );
}

function Badge({ children, color }) {
  return <span className={`badge ${color||"dim"}`}>{children}</span>;
}

function ThesisBadge({ status }) {
  const map = { intact:["green","●  intact"], watch:["amber","◐  watch"], broken:["red","○  broken"] };
  const [color, label] = map[status] || ["dim", status];
  return <Badge color={color}>{label}</Badge>;
}

function SeverityBadge({ severity }) {
  return <Badge color={severityBadge(severity)}>{severityLabel(severity)}</Badge>;
}

function OverviewPerformanceCharts({ portfolioOnly, positionOnly, chartHeight=160 }) {

    const points = {"1W":7,"1M":30,"3M":90,"6M":180,"1Y":365,"MAX":730}[p]||90;
    const data = [];
    const today = new Date("2026-05-02");
    let val = 35000;
    for (let i = points; i >= 0; i--) {
      const d = new Date(today); d.setDate(d.getDate()-i);
      val *= (1+(Math.random()-0.42)*0.012);
      data.push({date:d.toISOString().slice(0,10),value:parseFloat(val.toFixed(2))});
    }
    data[data.length-1].value = 26291.63;
    return data;
  }, []);

  const generatePositionHistory = useCallback((ticker, p) => {
    const points = {"1W":7,"1M":30,"3M":90,"6M":180,"1Y":365,"MAX":730}[p]||90;
    const pos = MOCK_DATA.portfolio.positions.find(x=>x.ticker===ticker);
    const data = [];

    let price = pos.live_price * 0.72;
    for (let i = points; i >= 0; i--) {
      const d = new Date(today); d.setDate(d.getDate()-i);
      price *= (1+(Math.random()-0.44)*0.018);
      data.push({date:d.toISOString().slice(0,10),price:parseFloat(price.toFixed(2))});

    data[data.length-1].price = pos.live_price;
    return data;

function TaxPage() {
  const { tax_year, portfolio, computeTotals } = MOCK_DATA;
  const RATE = MOCK_DATA.ABGELTUNGSTEUER;

  const allowRem = Math.max(0, tax_year.sparerpauschbetrag - tax_year.allowance_used);
  const lossPotRem = tax_year.loss_pot_carried_in; // simplified — no gains absorbed yet
  const headroom = allowRem + lossPotRem;

  // Compute net unrealised gains in EUR for each position
  const priced = portfolio.positions.map(p => {
    const gainEur = p.currency === "USD" ? p.unrealised_gain / p.fx_rate : p.unrealised_gain;
    return { ...p, gainEur };
  });
  const netEur = priced.reduce((s,p) => s + p.gainEur, 0);

  // Estimate total tax exposure
  let remaining = netEur;
  const lossPotConsumed = Math.min(lossPotRem, Math.max(0, remaining));
  remaining -= lossPotConsumed;
  const allowConsumed = Math.min(allowRem, Math.max(0, remaining));
  remaining -= allowConsumed;
  const taxableGain = Math.max(0, remaining);
  const taxOwed = taxableGain * RATE;

  const gains = priced.filter(p => p.gainEur > 0).sort((a,b) => b.gainEur - a.gainEur);
  const losses = priced.filter(p => p.gainEur < 0).sort((a,b) => a.gainEur - b.gainEur);

  return (
    <div>
      {/* YTD Summary */}
      <div className="metric-row cols-4">
        <MetricCard label="Sparerpauschbetrag" value={fmtEur(tax_year.sparerpauschbetrag)} delta={`${fmtEur(tax_year.allowance_used)} used · ${fmtEur(allowRem)} remaining`} deltaClass="off" small/>
        <MetricCard label="Realised Gains YTD" value={fmtEur(tax_year.realised_gains)} delta={`${fmtEur(tax_year.realised_losses)} losses · net ${fmtEur(tax_year.realised_gains - tax_year.realised_losses)}`} deltaClass={gainClass(tax_year.realised_gains - tax_year.realised_losses)} small/>
        <MetricCard label="Loss Pot (carried in)" value={fmtEur(tax_year.loss_pot_carried_in)} delta="from prior years · offsets future gains" deltaClass="off" small/>
        <MetricCard label="Tax Headroom" value={fmtEur(headroom)} delta={`${fmtEur(allowRem)} allowance + ${fmtEur(lossPotRem)} loss pot`} deltaClass="green" small/>
      </div>

      {/* Allowance bar */}
      <div style={{marginBottom:24}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--text3)",marginBottom:4}}>
          <span>Sparerpauschbetrag consumed</span>
          <span style={{fontFamily:"DM Mono,monospace"}}>{(tax_year.allowance_used / tax_year.sparerpauschbetrag * 100).toFixed(0)}% · {fmtEur(tax_year.allowance_used)} / {fmtEur(tax_year.sparerpauschbetrag)}</span>
        </div>
        <div className="progress-wrap" style={{height:8}}>
          <div className="progress-fill" style={{width:`${(tax_year.allowance_used/tax_year.sparerpauschbetrag*100).toFixed(0)}%`,background:"var(--green)"}}></div>
        </div>
      </div>

      <hr className="divider"/>

      {/* Total tax exposure */}
      <div className="section-header">
        <div>
          <div className="section-title">Total Tax Exposure</div>
          <div className="section-sub">Estimated Abgeltungsteuer if every position were closed at today's prices</div>
        </div>
      </div>

      <div className="metric-row cols-4">
        <MetricCard label="Net Unrealised Gain" value={fmtEur(netEur, true)} delta={fmtPct(netEur / priced.reduce((s,p)=>{const c=p.currency==="USD"?p.total_cost_basis/p.fx_rate:p.total_cost_basis;return s+c;},0), true)} deltaClass={gainClass(netEur)} small/>
        <MetricCard label="Sheltered (Allowance + Loss Pot)" value={fmtEur(lossPotConsumed + allowConsumed)} delta="absorbed before tax" deltaClass="off" small/>
        <MetricCard label="Taxable Gain" value={fmtEur(taxableGain)} delta={taxableGain === 0 ? "fully sheltered ✓" : "subject to Abgeltungsteuer"} deltaClass={taxableGain === 0 ? "up" : "amber"} small/>
        <MetricCard label="Tax Owed (if closed today)" value={fmtEur(taxOwed)} delta={taxOwed === 0 ? "€0 — tax-free" : `${(RATE*100).toFixed(3)}% Abgeltungsteuer`} deltaClass={taxOwed === 0 ? "up" : "down"} small/>
      </div>

      <hr className="divider"/>

      {/* Harvest opportunity */}
      <div className="section-header">
        <div>
          <div className="section-title">Harvest Opportunity</div>
          <div className="section-sub">Positions with unrealised gains — largest first. 'Tax if Realised' assumes this is the only trade from today.</div>
        </div>
        <MetricCard label="Tax-free headroom" value={fmtEur(headroom)} small />
      </div>

      <div className="table-wrap">
        <table className="data-table">
          <thead>
            <tr>
              <th>Ticker</th>
              <th>Name</th>
              <th className="right">Gain (€)</th>
              <th className="right">Gain %</th>
              <th className="right">Tax if Realised</th>
              <th className="right">Headroom Left</th>
              <th>Horizon</th>
              <th>Thesis</th>
            </tr>
          </thead>
          <tbody>
            {gains.map(pos => {
              let r = pos.gainEur;
              const lpc = Math.min(lossPotRem, Math.max(0,r)); r -= lpc;
              const ac = Math.min(allowRem, Math.max(0,r)); r -= ac;
              const tg = Math.max(0,r);
              const tw = tg * RATE;
              const costEur = pos.currency==="USD" ? pos.total_cost_basis/pos.fx_rate : pos.total_cost_basis;
              return (
                <tr key={pos.ticker}>
                  <td className="mono" style={{fontWeight:600}}>{pos.ticker}</td>
                  <td className="dim">{pos.name}</td>
                  <td className="right mono metric-delta up" style={{padding:"10px 12px"}}>{fmtEur(pos.gainEur, true)}</td>
                  <td className="right mono" style={{color:"var(--green)"}}>{fmtPct(pos.gainEur/costEur, true)}</td>
                  <td className="right mono">{tw === 0 ? <Badge color="green">Tax-free</Badge> : <span style={{color:"var(--red)"}}>{fmtEur(tw)}</span>}</td>
                  <td className="right mono dim">{fmtEur(Math.max(0, headroom - pos.gainEur))}</td>
                  <td><Badge color="dim">{pos.horizon}</Badge></td>
                  <td><ThesisBadge status={pos.thesis_status}/></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {losses.length > 0 && (
        <div className="info-box" style={{marginTop:12}}>
          <strong style={{color:"var(--text)"}}>Loss positions — realising these adds to the loss pot:</strong><br/>
          <span style={{marginTop:4,display:"block"}}>
            {losses.map(p => <span key={p.ticker} style={{marginRight:12, fontFamily:"DM Mono,monospace",fontSize:11}}>{p.ticker} <span style={{color:"var(--red)"}}>{fmtEur(p.gainEur,true)}</span></span>)}
          </span>
        </div>
      )}
    </div>
  );
}

function PerformancePage() {
  const [period, setPeriod] = useState("3M");
  const [selectedTicker, setSelectedTicker] = useState("NVDA");
  const periods = ["1W","1M","3M","6M","1Y","MAX"];

  // Generate mock historical data
  const generatePortfolioHistory = useCallback((p) => {
    const points = { "1W":7, "1M":30, "3M":90, "6M":180, "1Y":365, "MAX":730 }[p] || 90;
    const data = [];
    const today = new Date("2026-05-02");
    let val = 35000;
    for (let i = points; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      val *= (1 + (Math.random() - 0.42) * 0.012);
      data.push({
        date: d.toISOString().slice(0,10),
        value: parseFloat(val.toFixed(2)),
      });
    }
    // End near our actual total
    data[data.length-1].value = 26291.63;
    return data;
  }, []);

  const generatePositionHistory = useCallback((ticker, p) => {
    const points = { "1W":7, "1M":30, "3M":90, "6M":180, "1Y":365, "MAX":730 }[p] || 90;
    const pos = MOCK_DATA.portfolio.positions.find(x=>x.ticker===ticker);
    const data = [];
    const today = new Date("2026-05-02");
    let price = pos.live_price * 0.72;
    for (let i = points; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      price *= (1 + (Math.random() - 0.44) * 0.018);
      data.push({ date: d.toISOString().slice(0,10), price: parseFloat(price.toFixed(2)) });
    }
    data[data.length-1].price = pos.live_price;
    return data;
  }, []);

  const portfolioData = useMemo(() => generatePortfolioHistory(period), [period]);
  const posData = useMemo(() => generatePositionHistory(selectedTicker, period), [selectedTicker, period]);

  const portStart = portfolioData[0]?.value;
  const portEnd   = portfolioData[portfolioData.length-1]?.value;
  const portChg   = portEnd - portStart;
  const portChgPct= portChg / portStart;

  const posStart  = posData[0]?.price;
  const posEnd    = posData[posData.length-1]?.price;
  const posChg    = posEnd - posStart;
  const posChgPct = posChg / posStart;
  const selPos    = MOCK_DATA.portfolio.positions.find(p=>p.ticker===selectedTicker);

  return (
    <div>
      <div className="period-row">
        {["1W","1M","3M","6M","1Y","MAX"].map(p => (
          <button key={p} className={`period-btn${period===p?" active":""}`} onClick={()=>setPeriod(p)}>{p}</button>
        ))}
      </div>

      {/* Portfolio chart */}
      <div className="section-header">
        <div>
          <div className="section-title">Portfolio Value</div>
          <div className={`metric-delta ${gainClass(portChg)}`} style={{fontSize:13,marginTop:2}}>
            {fmtEur(portChg,true)} {fmtPct(portChgPct,true)} · {period}
          </div>
        </div>
      </div>

      <div className="chart-wrap" style={{marginBottom:24}}>
        <MiniAreaChart data={portfolioData} color="var(--green)" valueKey="value" width={900} height={220}/>
      </div>

      <hr className="divider"/>

      {/* Position chart */}
      <div className="section-header">
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div>
            <div className="section-title">Position: {selectedTicker}</div>
            <div className={`metric-delta ${gainClass(posChg)}`} style={{fontSize:13,marginTop:2}}>
              {fmtNum(posChg,2,true)} {fmtPct(posChgPct,true)} · {period}
            </div>
          </div>
        </div>
        <select className="select-field" value={selectedTicker} onChange={e=>setSelectedTicker(e.target.value)}>
          {MOCK_DATA.portfolio.positions.map(p => (
            <option key={p.ticker} value={p.ticker}>{p.ticker} — {p.name}</option>
          ))}
        </select>
      </div>

      <div className="two-col">
        <div className="chart-wrap">
          <div style={{fontSize:12,color:"var(--text3)",marginBottom:10}}>Price ({selPos?.currency})</div>
          <MiniAreaChart data={posData} color={posChg>=0?"var(--green)":"var(--red)"} valueKey="price" width={460} height={180}/>
        </div>

        {/* Position summary */}
        {selPos && (
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div className="metric-card">
              <div className="metric-label">Unrealised Gain</div>
              <div className={`metric-value sm metric-delta ${gainClass(selPos.unrealised_gain)}`}>
                {fmtEur(selPos.currency==="USD"?selPos.unrealised_gain/selPos.fx_rate:selPos.unrealised_gain,true)}
              </div>
              <div className={`metric-delta ${gainClass(selPos.unrealised_gain_pct)}`}>{fmtPct(selPos.unrealised_gain_pct,true)}</div>
            </div>
            <div className="metric-card">
              <div className="metric-label">Cost Basis → Current Value</div>
              <div className="metric-value sm">{fmtEur(selPos.currency==="USD"?selPos.total_cost_basis/selPos.fx_rate:selPos.total_cost_basis)} → {fmtEur(selPos.currency==="USD"?selPos.current_value/selPos.fx_rate:selPos.current_value)}</div>
            </div>
            <div className="metric-card">
              <div className="metric-label">Thesis</div>
              <div style={{marginTop:6}}><ThesisBadge status={selPos.thesis_status}/></div>
              <div style={{fontSize:12,color:"var(--text2)",marginTop:6,lineHeight:1.45}}>{selPos.thesis_notes}</div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

        <div style={{marginLeft:"auto",fontSize:12,color:"var(--text3)",fontFamily:"DM Mono,monospace"}}>
          {checkedCount} / {items.length} checked
        </div>
      </div>

      {nearCatalysts.length > 0 && (
        <div className="flag-card high" style={{marginBottom:12}}>
          <div className="flag-title">⚠ Catalyst within {nearCatalysts[0].days} day(s): {nearCatalysts[0].description}</div>
          <div className="flag-desc">{nearCatalysts[0].event_date} — exercise extra caution</div>
        </div>
      )}

      <div className="table-wrap" style={{padding:"8px 0"}}>
        {categories.map(cat => (
          <div key={cat}>
            <div className="check-category">{cat}</div>
            {items.filter(i=>i.cat===cat).map(item => {
              const key = `${selectedTicker}-${action}-${item.id}`;
              const checked = !!checkedItems[key];
              return (
                <div key={item.id} className={`checklist-item${checked?" checked":""}`}
                  onClick={() => setCheckedItems(prev => ({...prev, [key]: !prev[key]}))}>
                  <div className={`check-box${checked?" checked":""}`}>
                    {checked && <svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3 5-6" stroke="white" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                  </div>
                  <div className={`check-text${checked?" checked":""}`}>{item.q}</div>
                </div>
              );
            })}
          </div>
        ))}
      </div>

      <div style={{marginTop:12}}>
        {checkedCount === items.length
          ? <div className="flag-card low"><div className="flag-title">✓ All {items.length} items confirmed — you may proceed.</div></div>
          : <div className="flag-card critical"><div className="flag-title">{items.length - checkedCount} of {items.length} items unchecked — do not trade yet.</div></div>
        }
      </div>

      <div style={{marginTop:8,display:"flex",justifyContent:"flex-end"}}>
        <button className="refresh-btn" onClick={()=>setCheckedItems({})}>Reset checklist</button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// PAGE: Lot Ledger
// ─────────────────────────────────────────────────────────────────────────
function LotLedgerPage() {
  const [selectedTicker, setSelectedTicker] = useState("ALL");
  const [filter, setFilter] = useState("ALL"); // ALL | BUY | SELL
  const { lots, portfolio } = MOCK_DATA;

  const byTicker = selectedTicker === "ALL" ? lots : lots.filter(l => l.ticker === selectedTicker);
  const groupedByTicker = {};
  byTicker.forEach(l => { (groupedByTicker[l.ticker] = groupedByTicker[l.ticker] || []).push(l); });

  // Summary stats
  const totalBuys  = lots.filter(l => l.type === "buy").length;
  const totalSells = lots.filter(l => l.type === "sell").length;
  const realisedGain = lots.filter(l => l.type === "sell").reduce((s,l) => s + (l.realised_gain || 0), 0);

  // Per-lot unrealised gain across all open buy lots
  const totalUnrealisedEur = lots.filter(l => l.type === "buy").reduce((s, lot) => {
    const pos = portfolio.positions.find(p => p.ticker === lot.ticker);
    if (!pos?.live_price) return s;
    const lotVal  = pos.live_price * lot.shares;
    const lotGain = lotVal - lot.amount;
    const gainEur = pos.currency === "USD" ? lotGain / pos.fx_rate : lotGain;
    return s + gainEur;
  }, 0);

  return (
    <div>
      {/* Summary strip */}
      <div className="metric-row cols-4" style={{marginBottom:4}}>
        <MetricCard label="Open Buy Lots" value={totalBuys} delta="currently held" deltaClass="off" small/>
        <MetricCard label="Closed Sell Lots" value={totalSells} delta="fully or partially disposed" deltaClass="off" small/>
        <MetricCard label="Total Realised Gain" value={fmtEur(realisedGain, true)} delta="across all disposals" deltaClass={gainClass(realisedGain)} small/>
        <div className="metric-card" style={{border:"1px solid var(--green)",background:"oklch(0.17 0.04 145)"}}>
          <div className="metric-label" style={{color:"var(--green)"}}>Total Unrealised Gain (€)</div>
          <div className={`metric-value sm metric-delta ${gainClass(totalUnrealisedEur)}`}>{fmtEur(totalUnrealisedEur, true)}</div>
          <div className="metric-delta off" style={{marginTop:4}}>across all open lots · live prices</div>
        </div>
      </div>

      {/* Feature callout */}
      <div style={{
        background:"oklch(0.19 0.04 250)",
        border:"1px solid oklch(0.72 0.14 230)",
        borderRadius:8,
        padding:"10px 14px",
        marginBottom:20,
        display:"flex",
        alignItems:"center",
        gap:10,
        fontSize:12,
        color:"var(--text2)"
      }}>
        <span style={{color:"oklch(0.72 0.14 230)",fontSize:14,flexShrink:0}}>💡</span>
        <span>
          <strong style={{color:"var(--text)"}}>Currently missing from your Streamlit app:</strong>{" "}
          Per-lot unrealised P&L and the total unrealised gain strip above. 
          Add <code style={{background:"var(--surface2)",padding:"1px 5px",borderRadius:3,fontFamily:"DM Mono,monospace",fontSize:11}}>lot.unrealised_gain_eur</code> as a computed property in <code style={{background:"var(--surface2)",padding:"1px 5px",borderRadius:3,fontFamily:"DM Mono,monospace",fontSize:11}}>position.py</code> and surface it in <code style={{background:"var(--surface2)",padding:"1px 5px",borderRadius:3,fontFamily:"DM Mono,monospace",fontSize:11}}>lot_table.py</code>.
        </span>
      </div>

      <div className="section-header">
        <div>
          <div className="section-title">Transaction Ledger</div>
          <div className="section-sub">All buy and sell transactions — FIFO disposal order under §20 EStG</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {/* Type filter */}
          <div style={{display:"flex",gap:3,background:"var(--surface2)",borderRadius:7,padding:3}}>
            {["ALL","BUY","SELL"].map(f => (
              <button key={f} className={`period-btn${filter===f?" active":""}`} onClick={()=>setFilter(f)}>{f}</button>
            ))}
          </div>
          <select className="select-field" value={selectedTicker} onChange={e=>setSelectedTicker(e.target.value)}>
            <option value="ALL">All Positions</option>
            {portfolio.positions.map(p => <option key={p.ticker} value={p.ticker}>{p.ticker}</option>)}
          </select>
        </div>
      </div>

      {Object.entries(groupedByTicker).map(([ticker, tickerLots]) => {
        const pos = portfolio.positions.find(p => p.ticker === ticker);
        const gainEur = pos ? (pos.currency === "USD" ? pos.unrealised_gain / pos.fx_rate : pos.unrealised_gain) : null;
        const sorted = [...tickerLots].sort((a,b) => new Date(a.date) - new Date(b.date));
        const visible = filter === "ALL" ? sorted : sorted.filter(l => l.type === filter.toLowerCase());
        if (visible.length === 0) return null;

        // FIFO counter: only buy lots get a FIFO number
        let fifoCounter = 0;
        const fifoMap = {};
        sorted.forEach(l => { if (l.type === "buy") { fifoCounter++; fifoMap[l.lot_id] = fifoCounter; } });

        return (
          <div key={ticker} style={{marginBottom:24}}>
            {/* Ticker header */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <span style={{fontFamily:"DM Mono,monospace",fontWeight:700,fontSize:14,color:"var(--text)"}}>{ticker}</span>
              {pos && <span style={{fontSize:12,color:"var(--text3)"}}>{pos.name}</span>}
              {pos && <ThesisBadge status={pos.thesis_status}/>}
              <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:11,color:"var(--text3)",fontFamily:"DM Mono,monospace"}}>
                  {sorted.filter(l=>l.type==="buy").length} buys · {sorted.filter(l=>l.type==="sell").length} sells
                </span>
                {gainEur != null && (
                  <span style={{
                    display:"inline-flex", alignItems:"center", gap:5,
                    background: gainEur >= 0 ? "var(--green-bg)" : "var(--red-bg)",
                    color: gainEur >= 0 ? "var(--green)" : "var(--red)",
                    borderRadius:6, padding:"3px 10px",
                    fontFamily:"DM Mono,monospace", fontSize:12, fontWeight:600,
                  }}>
                    {fmtEur(gainEur, true)}
                    <span style={{fontSize:10, fontWeight:400, opacity:0.7}}>total unrealised</span>
                  </span>
                )}
              </div>
            </div>

            <div className="table-wrap">
              <table className="data-table">
                <thead>
                  <tr>
                    <th>Type</th>
                    <th>Lot ID</th>
                    <th>Date</th>
                    <th>FIFO</th>
                    <th className="right">Shares</th>
                    <th className="right">Price/Share</th>
                    <th className="right">Amount</th>
                    <th>Ccy</th>
                    <th className="right">Unrealised / Realised P&amp;L (€)</th>
                    <th>Notes</th>
                  </tr>
                </thead>
                <tbody>
                  {visible.map(lot => {
                    const isBuy  = lot.type === "buy";
                    const isSell = lot.type === "sell";
                    const fifoNo = fifoMap[lot.lot_id];
                    const fifoSrc = lot.fifo_lot ? fifoMap[lot.fifo_lot] : null;

                    // For open buy lots: compute live unrealised P&L
                    let pnlEur = null;
                    if (isBuy && pos?.live_price) {
                      const lotVal = pos.live_price * lot.shares;
                      const lotGain = lotVal - lot.amount;
                      pnlEur = pos.currency === "USD" ? lotGain / pos.fx_rate : lotGain;
                    }
                    // For sell lots: use recorded realised gain
                    if (isSell && lot.realised_gain != null) {
                      pnlEur = pos?.currency === "USD" ? lot.realised_gain / pos.fx_rate : lot.realised_gain;
                    }

                    return (
                      <tr key={lot.lot_id} style={{
                        background: isSell ? "oklch(0.155 0.01 250)" : "transparent",
                        opacity: isSell ? 0.92 : 1,
                      }}>
                        {/* Type badge */}
                        <td>
                          {isBuy
                            ? <Badge color="green">↓ BUY</Badge>
                            : <Badge color="red">↑ SELL</Badge>
                          }
                        </td>
                        <td className="mono dim" style={{fontSize:11}}>{lot.lot_id}</td>
                        <td className="mono dim">{lot.date}</td>
                        {/* FIFO column */}
                        <td>
                          {isBuy && fifoNo != null && (
                            <Badge color="blue">#{fifoNo} — first out</Badge>
                          )}
                          {isSell && fifoSrc != null && (
                            <span style={{fontSize:11,color:"var(--text3)",fontFamily:"DM Mono,monospace"}}>
                              disposes #{fifoSrc}
                            </span>
                          )}
                          {isSell && fifoSrc == null && (
                            <span style={{fontSize:11,color:"var(--text3)"}}>—</span>
                          )}
                        </td>
                        <td className="right mono">{fmtNum(lot.shares, lot.shares % 1 === 0 ? 0 : 4)}</td>
                        <td className="right mono">{fmtNum(lot.price_per_share)}</td>
                        <td className="right mono" style={{color: isSell ? "var(--text2)" : "var(--text)"}}>
                          {isBuy ? fmtEur(pos?.currency==="USD" ? lot.amount/pos.fx_rate : lot.amount) : `(${fmtEur(pos?.currency==="USD" ? lot.amount/pos.fx_rate : lot.amount)})`}
                        </td>
                        <td><Badge color="dim">{lot.currency}</Badge></td>
                        <td className="right" style={{padding:"10px 12px"}}>
                          {pnlEur != null ? (
                            isBuy ? (
                              <span style={{
                                display:"inline-flex",alignItems:"center",gap:5,
                                background: pnlEur >= 0 ? "var(--green-bg)" : "var(--red-bg)",
                                color: pnlEur >= 0 ? "var(--green)" : "var(--red)",
                                borderRadius:6, padding:"3px 8px",
                                fontFamily:"DM Mono,monospace", fontSize:12, fontWeight:600,
                              }}>
                                {fmtEur(pnlEur, true)}
                                <span style={{fontSize:10,opacity:0.65,fontWeight:400}}>unreal.</span>
                              </span>
                            ) : (
                              <span style={{
                                display:"inline-flex",alignItems:"center",gap:5,
                                color: pnlEur >= 0 ? "var(--green)" : "var(--red)",
                                fontFamily:"DM Mono,monospace", fontSize:12,
                                opacity:0.8,
                              }}>
                                {fmtEur(pnlEur, true)}
                                <span style={{fontSize:10,opacity:0.65}}>realised</span>
                              </span>
                            )
                          ) : <span style={{color:"var(--text3)"}}>—</span>}
                        </td>
                        <td style={{fontSize:11,color:"var(--text3)",maxWidth:220,whiteSpace:"normal",lineHeight:1.4}}>
                          {lot.notes}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      })}

      <div className="info-box" style={{marginTop:4}}>
        <strong style={{color:"var(--text)"}}>German FIFO Rule (§20 EStG):</strong>{" "}
        The oldest buy lot is disposed first on any sell. Cost basis is always per-lot — average cost is display-only and never used for tax calculations.
        Realised gains from sell rows feed directly into the Tax Dashboard.
      </div>
    </div>
  );
}

      {/* ── TAB: Add New Position ─────────────────────────────────────────── */}
